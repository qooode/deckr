services:
  deckr:
    build: .
    container_name: deckr
    restart: unless-stopped
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID:-}
      - DISCORD_ADMIN_IDS=${DISCORD_ADMIN_IDS}
      - CLAIM_COOLDOWN_MINUTES=${CLAIM_COOLDOWN_MINUTES:-1440}
    volumes:
      - deckr-data:/app/data

volumes:
  deckr-data:
    driver: local
